name: CI
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  configuration-and-kodi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install -r tools/requirements.txt
      - run: python tools/release.py validate config/manifest.example.json
      - run: python -m unittest discover -s tools -p "test_*.py"
      - run: python -m compileall -q kodi tools
      - run: python tools/release.py kodi --output artifacts/kodi --base-url https://example.invalid/kodi

  admin-portal:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: "8.0.x" }
      - run: dotnet restore admin-portal/KodiSetup.Admin.csproj
      - run: dotnet build admin-portal/KodiSetup.Admin.csproj -c Release --no-restore
      - run: dotnet run --project admin-portal.tests/KodiSetup.Admin.Tests.csproj -c Release

  control-api:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: control-api } }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: pnpm, cache-dependency-path: control-api/pnpm-lock.yaml }
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm check
      - run: pnpm test

  android:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: android-app } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: gradle/actions/setup-gradle@v4
        with: { gradle-version: "8.13" }
      - run: gradle :app:testDebugUnitTest :app:lintDebug
